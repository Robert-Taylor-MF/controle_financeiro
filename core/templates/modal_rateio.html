<div id="modal-rateio" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-700 p-6 md:p-8 rounded-xl shadow-[0_0_50px_rgba(255,255,255,0.1)] w-full max-w-2xl relative max-h-[90vh] overflow-y-auto">
        <button onclick="fecharModalRateio()" class="absolute top-4 right-4 text-slate-500 hover:text-red-500 transition-colors"><i data-lucide="x-circle" class="w-8 h-8"></i></button>
        
        <div class="mb-6 border-b border-slate-800 pb-4">
            <h3 class="text-2xl font-black text-slate-100 uppercase tracking-widest flex items-center gap-2"><i data-lucide="split-square-horizontal" class="w-6 h-6 text-emerald-400"></i> Dividir Saque</h3>
            <p id="desc-rateio" class="text-slate-400 mt-2 text-sm font-bold truncate"></p>
            <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Loot Original: <span id="valor-rateio-texto" class="text-emerald-400 font-bold text-lg ml-1"></span></p>
        </div>

        <div class="flex gap-2 mb-6 pb-6 border-b border-slate-800">
            <select id="seletor-pessoas-rateio" class="flex-1 bg-slate-950 text-slate-300 border border-slate-700 rounded p-3 focus:border-emerald-500 outline-none transition-colors shadow-inner">
                <option value="" disabled selected>Escolha um aliado para dividir...</option>
                {% for pessoa in pessoas %}
                    <option value="{{ pessoa.id }}" data-nome="{{ pessoa.nome }}">
                        {{ pessoa.nome }} {% if pessoa.is_owner %}(Eu){% endif %}
                    </option>
                {% endfor %}
            </select>
            <button type="button" onclick="adicionarPessoaRateio()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-slate-100 font-bold rounded border border-slate-700 transition-colors flex items-center gap-2 uppercase text-sm tracking-wider shadow-lg">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Aliado
            </button>
        </div>

        <form id="form-rateio" method="POST" action="">
            {% csrf_token %}
            <input type="hidden" id="valor-total-input" value="0">
            
            <div id="container-rateio" class="space-y-3 mb-6 max-h-[30vh] overflow-y-auto pr-2">
                <!-- Inputs added dynamically here -->
            </div>

            <div class="flex items-end justify-between mb-6">
                <div class="text-sm text-slate-400">
                    Soma atual: <br><span id="soma-atual" class="font-black text-2xl text-slate-200">R$ 0.00</span>
                </div>
                <div id="alerta-soma" class="text-xs text-red-400 font-bold hidden bg-red-900/20 px-3 py-1.5 rounded border border-red-900/50 uppercase tracking-widest flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i> A soma não bate!</div>
            </div>

            <button type="submit" id="btn-confirmar-rateio" class="w-full px-6 py-4 bg-emerald-700 hover:bg-emerald-600 text-white font-black rounded-lg shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all uppercase tracking-widest opacity-50 cursor-not-allowed flex items-center justify-center gap-2" disabled>
                <i data-lucide="check-circle-2" class="w-5 h-5"></i> Confirmar Divisão
            </button>
        </form>
    </div>
</div>

<script>
    let valorTotalRateio = 0;
    
    function abrirModalRateio(transacaoId, descricao, valor) {
        valorTotalRateio = parseFloat(valor.replace(',', '.'));
        
        document.getElementById('desc-rateio').innerText = descricao;
        document.getElementById('valor-rateio-texto').innerText = `R$ ${valorTotalRateio.toFixed(2).replace('.', ',')}`;
        document.getElementById('valor-total-input').value = valorTotalRateio;
        
        // Define a URL do formulário
        document.getElementById('form-rateio').action = `/dividir/${transacaoId}/`;
        
        // Limpa tudo
        document.getElementById('container-rateio').innerHTML = '';
        document.getElementById('soma-atual').innerText = 'R$ 0.00';
        document.getElementById('soma-atual').className = 'font-black text-2xl text-slate-200';
        document.getElementById('btn-confirmar-rateio').disabled = true;
        document.getElementById('btn-confirmar-rateio').classList.add('opacity-50', 'cursor-not-allowed');
        document.getElementById('alerta-soma').classList.add('hidden');
        
        // Restaura todas as opções no select
        const seletor = document.getElementById('seletor-pessoas-rateio');
        seletor.value = "";
        Array.from(seletor.options).forEach(opt => {
            if (opt.value !== "") opt.style.display = 'block';
        });

        const modal = document.getElementById('modal-rateio');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    }

    function fecharModalRateio() {
        const modal = document.getElementById('modal-rateio');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function adicionarPessoaRateio() {
        const seletor = document.getElementById('seletor-pessoas-rateio');
        const opcao = seletor.options[seletor.selectedIndex];
        
        if (!opcao.value) return;

        const id = opcao.value;
        const nome = opcao.getAttribute('data-nome');

        const div = document.createElement('div');
        div.className = "flex items-center justify-between bg-slate-950 p-3 rounded-lg border border-slate-700 linha-rateio hover:border-emerald-900 transition-colors";
        div.id = `linha-rateio-${id}`;
        
        div.innerHTML = `
            <label class="font-bold text-slate-200 flex-1 truncate pr-4 text-sm"><i data-lucide="user" class="w-3 h-3 inline text-slate-500 mr-1"></i> ${nome}</label>
            <div class="flex items-center gap-2">
                <span class="text-slate-500 font-bold text-xs uppercase">R$</span>
                <input type="number" step="0.01" min="0" name="valor_pessoa_${id}" class="input-valor-rateio-dinamico w-24 bg-slate-800 text-slate-100 font-mono font-bold border border-slate-600 rounded p-1.5 text-right focus:outline-none focus:border-emerald-500 transition-colors shadow-inner" oninput="validarSomaRateio()">
                <button type="button" onclick="removerPessoaRateio('${id}')" class="text-slate-600 hover:text-red-500 p-1 border border-transparent hover:border-red-900/50 rounded transition-colors" title="Remover Gasto"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        `;
        document.getElementById('container-rateio').appendChild(div);
        
        // Esconde a pessoa recém adicionada e reseta select
        opcao.style.display = 'none';
        seletor.value = "";
        
        recalcularValoresIguais();
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function removerPessoaRateio(id) {
        document.getElementById(`linha-rateio-${id}`).remove();
        
        const seletor = document.getElementById('seletor-pessoas-rateio');
        const opcao = Array.from(seletor.options).find(opt => opt.value === id);
        if (opcao) opcao.style.display = 'block';
        
        recalcularValoresIguais();
    }

    function recalcularValoresIguais() {
        const inputs = document.querySelectorAll('.input-valor-rateio-dinamico');
        if (inputs.length === 0) {
            validarSomaRateio();
            return;
        }

        const valorPorPessoa = valorTotalRateio / inputs.length;
        let somaParcial = 0;
        
        for (let i = 0; i < inputs.length - 1; i++) {
            let val = Math.round(valorPorPessoa * 100) / 100;
            inputs[i].value = val.toFixed(2);
            somaParcial += val;
        }
        
        let ultimoVal = valorTotalRateio - somaParcial;
        inputs[inputs.length - 1].value = ultimoVal.toFixed(2);
        
        validarSomaRateio();
    }

    function validarSomaRateio() {
        let soma = 0;
        const inputs = document.querySelectorAll('.input-valor-rateio-dinamico');
        inputs.forEach(input => {
            soma += parseFloat(input.value || 0);
        });
        
        const diff = Math.abs(soma - valorTotalRateio);
        const elSoma = document.getElementById('soma-atual');
        const btn = document.getElementById('btn-confirmar-rateio');
        const alerta = document.getElementById('alerta-soma');
        
        elSoma.innerText = `R$ ${soma.toFixed(2).replace('.', ',')}`;
        
        if (diff < 0.01) {
            elSoma.className = 'font-black text-2xl text-emerald-400';
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            alerta.classList.add('hidden');
        } else {
            elSoma.className = 'font-black text-2xl text-red-500';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            alerta.classList.remove('hidden');
        }
    }
</script>
