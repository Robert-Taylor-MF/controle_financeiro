{% extends 'base.html' %}

{% block conteudo %}
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-slate-100">Blindagem do Cofre</h2>
        <p class="text-slate-400">Reforce as fechaduras mágicas do seu acesso.</p>
    </header>

    <div class="max-w-xl mx-auto bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-xl mt-10">
        
        <div class="flex items-center gap-4 mb-8 pb-6 border-b border-slate-800">
            <div class="bg-red-900/30 p-3 rounded-full border border-red-500/30">
                <i data-lucide="shield-check" class="w-8 h-8 text-red-500"></i>
            </div>
            <div>
                <h3 class="text-xl font-black text-slate-200">Alterar Senha do Mestre</h3>
                <p class="text-sm text-slate-500 mt-1">Proteja as riquezas da guilda com uma nova combinação.</p>
            </div>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Chave Mágica Atual</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="unlock" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="password" name="senha_antiga" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required autofocus>
                </div>
            </div>

            <div class="border-t border-slate-800/50 pt-6 mt-6 space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Novo Ouro Blindado</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="text-slate-600 w-4 h-4"></i>
                        </div>
                        <input type="password" name="nova_senha" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Confirmar Novo Ouro</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="check-circle" class="text-slate-600 w-4 h-4"></i>
                        </div>
                        <input type="password" name="nova_senha_confirm" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-red-700 hover:bg-red-600 text-white font-bold rounded shadow-[0_0_15px_rgba(185,28,28,0.2)] transition-all uppercase tracking-widest flex items-center justify-center gap-2 mt-4">
                <i data-lucide="shield-alert" class="w-5 h-5"></i> Trancar Portões
            </button>
        </form>
    </div>
{% endblock %}
