<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForjaDev - Setup Inicial da Guilda</title>
    
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center relative overflow-x-hidden overflow-y-auto py-8">
    
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-red-900/20 rounded-full blur-[100px] -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-900/20 rounded-full blur-[100px] -z-10"></div>

    <div class="bg-slate-900 border border-slate-800 p-10 rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.5)] w-full max-w-md relative z-10 m-auto">
        
        <div class="flex flex-col items-center justify-center mb-6">
            <div class="bg-slate-950 p-4 rounded-full border border-slate-800 shadow-inner mb-4">
                <i data-lucide="swords" class="text-red-600 w-12 h-12"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-slate-100 uppercase">Forja<span class="text-red-600">Dev</span></h1>
            <p class="text-slate-500 text-sm mt-2 tracking-widest uppercase font-bold text-center">Fundação da Guilda</p>
            <p class="text-slate-400 text-xs mt-2 text-center px-4">Nenhum guerreiro registrado no DB. Registre o seu Mestre de Guilda abaixo para iniciar.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-950/50 border border-red-900 text-red-400 p-3 rounded text-sm text-center mb-6 flex items-center justify-center gap-2">
                    <i data-lucide="alert-triangle" class="w-4 h-4"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Apelido (Mestre)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="text" name="username" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required autofocus>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Email Protegido</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="mail" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="email" name="email" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Senha do Cofre</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="password" name="password" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required minlength="4">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Confirmar Senha Mágica</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="password" name="password_confirm" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Pergunta Mágica (Para Recuperação)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="help-circle" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="text" name="pergunta_secreta" placeholder="Ex: Nome do primeiro pet?" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Resposta Mágica</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="key" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="text" name="resposta_secreta" placeholder="Ex: Thor" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                </div>
            </div>

            <!-- CHAVE DA IA -->
            <div class="pt-4 mt-2 border-t border-slate-800">
                <h3 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-4 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> A Essência do Oráculo (Opcional)</h3>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Google Gemini API Key</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="key" class="text-blue-500 w-4 h-4"></i>
                        </div>
                        <input type="password" name="api_key_gemini" placeholder="AIzaSy..." class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-red-700 hover:bg-red-600 text-white font-bold rounded shadow-[0_0_15px_rgba(185,28,28,0.3)] transition-all uppercase tracking-widest flex items-center justify-center gap-2 mt-4">
                <i data-lucide="hammer" class="w-5 h-5"></i> Forjar Líder
            </button>
        </form>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
