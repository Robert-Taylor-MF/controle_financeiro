<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForjaDev - Recuperação Mágica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-red-900/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-96 h-96 bg-purple-900/20 rounded-full blur-[100px]"></div>

    <div class="bg-slate-900 border border-slate-800 p-10 rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.5)] w-full max-w-md z-10">
        
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="bg-slate-950 p-4 rounded-full border border-slate-800 shadow-inner mb-4">
                <i data-lucide="key-round" class="text-red-600 w-12 h-12"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter text-slate-100 uppercase">Forja<span class="text-red-600">Dev</span></h1>
            <p class="text-slate-500 text-sm mt-2 tracking-widest uppercase font-bold text-center">Recuperar Acesso</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-950/50 border border-red-900 text-red-400 p-3 rounded text-sm text-center mb-6 flex items-center justify-center gap-2">
                    <i data-lucide="alert-triangle" class="w-4 h-4"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            {% if fase == '1' %}
            <input type="hidden" name="fase" value="1">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Usuário (Quem Busca a Chave)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="text" name="username" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required autofocus>
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-red-700 hover:bg-red-600 text-white font-bold rounded shadow-[0_0_15px_rgba(185,28,28,0.3)] transition-all uppercase tracking-widest flex items-center justify-center gap-2 mt-4">
                <i data-lucide="search" class="w-5 h-5"></i> Convocar Feitiço
            </button>
            {% else %}
            
            <input type="hidden" name="fase" value="2">
            <input type="hidden" name="username" value="{{ username }}">
            
            <div class="bg-slate-950 border border-purple-900/50 p-4 rounded text-center mb-6">
                <p class="text-xs text-purple-400 uppercase tracking-widest font-bold mb-1">Enigma de {{ username }}</p>
                <p class="text-slate-200 font-bold">"{{ pergunta }}"</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Sua Resposta</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="message-square" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="text" name="resposta" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required autofocus>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Forjar Nova Senha</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="password" name="nova_senha" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Confirmar Novo Ouro</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="text-slate-600 w-4 h-4"></i>
                    </div>
                    <input type="password" name="nova_senha_confirm" class="w-full bg-slate-950 border border-slate-700 rounded py-3 pl-10 pr-3 text-slate-200 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all" required>
                </div>
            </div>
            
            <button type="submit" class="w-full py-3 bg-red-700 hover:bg-red-600 text-white font-bold rounded shadow-[0_0_15px_rgba(185,28,28,0.3)] transition-all uppercase tracking-widest flex items-center justify-center gap-2 mt-4">
                <i data-lucide="hammer" class="w-5 h-5"></i> Alterar Feitiço
            </button>
            {% endif %}
            
            <div class="text-center mt-6">
                <a href="{% url 'login' %}" class="text-xs text-slate-500 hover:text-red-400 uppercase tracking-widest font-bold transition-colors">Voltar para o Portão</a>
            </div>
        </form>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
